name: CI

on:
  push:
    branches:
      - main

jobs:
  build-test:
    name: 빌드 및 테스트
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test


  build-image:
    name: Docker 이미지 빌드 및 푸시
    runs-on: ubuntu-latest
    needs: build-test

    outputs:
      IMAGE_TAG: ${{ steps.tag.outputs.tag }}
      DOCKER_IMAGE_NAME: ${{ steps.vars.outputs.docker_image_name }}
      OWNER_LC: ${{ steps.vars.outputs.owner_lc }}

    steps:
      - uses: actions/checkout@v4

      - name: 이미지 태그 생성 (commit SHA)
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: 변수 설정
        id: vars
        run: |
          echo "docker_image_name=${{ vars.PROJECT_NAME }}-app" >> $GITHUB_OUTPUT
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Docker Buildx 설치
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ steps.vars.outputs.docker_image_name }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ steps.vars.outputs.docker_image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
