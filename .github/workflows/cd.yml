name: CD - Release Deploy

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  OWNER_LC: ${{ github.repository_owner }}

jobs:
  deploy:
    name: EC2 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: OWNER 소문자 변환
        run: |
          echo "OWNER_LC=$(echo '${{ env.OWNER_LC }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: AWS 로그인 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_ROLE_NAME }}
          aws-region: ap-northeast-2

      - name: deploy.sh 실행 (SSM)
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --region ap-northeast-2 \
            --parameters commands="[\"sudo -u ssm-user bash /home/ssm-user/app/deploy/deploy.sh ghcr.io/$OWNER_LC/$IMAGE_NAME\"]" \
            --query "Command.CommandId" \
            --output text)
          
          echo "Command ID: $COMMAND_ID"

          # 실패하더라도 멈추지 않게 || true 추가
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region ap-northeast-2 || true

          # 실행 로그 출력
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region ap-northeast-2 \
            --query "{Status:Status, Output:StandardOutputContent, Error:StandardErrorContent}" \
            --output table

          # 최종 상태 체크
          FINAL_STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region ap-northeast-2 \
            --query "Status" \
            --output text)
          
          if [ "$FINAL_STATUS" != "Success" ]; then
            echo "Deployment failed with status: $FINAL_STATUS"
            exit 1
          fi
